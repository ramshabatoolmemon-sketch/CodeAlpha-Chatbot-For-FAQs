<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f13;
            --surface: #1a1a22;
            --surface2: #22222e;
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --accent: #6c63ff;
            --accent-dim: rgba(108,99,255,0.18);
            --text: #f0eff6;
            --text-muted: #8884a8;
            --text-dim: #5c5a78;
            --user-bubble: #6c63ff;
            --bot-bubble: #1e1e2a;
            --green: #4ade80;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* subtle dot grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(108,99,255,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 520px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            overflow: hidden;
            height: 680px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,99,255,0.1);
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            flex-shrink: 0;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(108,99,255,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar svg {
            width: 20px;
            height: 20px;
            fill: var(--accent);
        }

        .header-info { flex: 1; }
        .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
        .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(74,222,128,0.5);
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Messages ── */
        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #chatbox::-webkit-scrollbar { width: 4px; }
        #chatbox::-webkit-scrollbar-track { background: transparent; }
        #chatbox::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }

        .msg-row.bot .msg-avatar {
            background: var(--accent-dim);
            border: 1px solid rgba(108,99,255,0.3);
            color: var(--accent);
        }

        .msg-row.user .msg-avatar {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border2);
            color: var(--text-muted);
        }

        .bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .msg-row.bot .bubble {
            background: var(--bot-bubble);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-row.user .bubble {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: dot-bounce 1.2s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%            { transform: translateY(-6px); }
        }

        /* ── Suggestions ── */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            padding: 4px 18px 12px;
            flex-shrink: 0;
        }

        .sugg-chip {
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            padding: 6px 13px;
            border-radius: 20px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }

        .sugg-chip:hover {
            background: var(--accent-dim);
            border-color: rgba(108,99,255,0.5);
            color: var(--text);
        }

        /* ── Input ── */
        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface2);
            flex-shrink: 0;
        }

        #message {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.18s;
        }

        #message::placeholder { color: var(--text-dim); }

        #message:focus {
            border-color: rgba(108,99,255,0.6);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }

        #sendBtn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, opacity 0.15s;
        }

        #sendBtn:hover { transform: scale(1.07); }
        #sendBtn:active { transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        #sendBtn svg { width: 18px; height: 18px; fill: #fff; }

        @media (max-width: 540px) {
            body { padding: 0; align-items: stretch; }
            .container { width: 100%; height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
                <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm-1-5h2v2h-2zm0-8h2v6h-2z"/>
            </svg>
        </div>
        <div class="header-info">
            <div class="header-title">FAQ Assistant</div>
            <div class="header-sub">Powered by Claude AI</div>
        </div>
        <div class="status-dot" title="Online"></div>
    </div>

    <!-- Messages -->
    <div id="chatbox">
        <div class="msg-row bot">
            <div class="msg-avatar">AI</div>
            <div class="bubble">👋 Hi! I'm your FAQ assistant. Ask me anything about working hours, returns, shipping, pricing, or how to reach support.</div>
        </div>
    </div>

    <!-- Quick suggestions -->
    <div class="suggestions" id="suggestions">
        <button class="sugg-chip" onclick="quickSend(this)">Working hours?</button>
        <button class="sugg-chip" onclick="quickSend(this)">Return policy</button>
        <button class="sugg-chip" onclick="quickSend(this)">Shipping options</button>
        <button class="sugg-chip" onclick="quickSend(this)">Contact support</button>
        <button class="sugg-chip" onclick="quickSend(this)">Refund process</button>
    </div>

    <!-- Input -->
    <div class="input-area">
        <input type="text" id="message" placeholder="Type your question…" autocomplete="off" autofocus />
        <button id="sendBtn" onclick="sendMessage()" aria-label="Send">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

</div>

<script>
    /* ─── CONFIG ─────────────────────────────────────────────────────────────
       Paste your Anthropic API key below. Get one at console.anthropic.com
       ─────────────────────────────────────────────────────────────────────── */
    const API_KEY = 'YOUR_ANTHROPIC_API_KEY_HERE';

    /* ─── FAQ Knowledge Base (edit this to match your business) ──────────── */
    const SYSTEM_PROMPT = `You are a friendly, concise FAQ assistant for a retail business.
Only answer based on the knowledge base below. If a question is outside it, politely say you don't have that information and suggest contacting support.

KNOWLEDGE BASE:
- Working hours: Monday–Friday, 9 AM – 6 PM. Closed weekends and public holidays.
- Contact support: Email support@example.com or call +1-800-555-0199. We reply within 24 business hours.
- Returns: Items may be returned within 30 days of purchase in original condition with receipt.
- Refunds: Processed within 5–7 business days after the return is received. Refunded to original payment method.
- Shipping – Standard: 5–7 business days, free on orders over $50. Express: 2–3 days, $12.99. Overnight: $24.99.
- Pricing: All prices are in USD and include standard tax. Bulk order discounts available on request.
- Account: Sign up at example.com/signup. Reset your password via the email link on the login page.
- Privacy: We never sell your personal data. Full policy at example.com/privacy.

Keep answers short and friendly. Use plain language.`;

    /* ─── State ──────────────────────────────────────────────────────────── */
    const history = [];

    /* ─── Helpers ────────────────────────────────────────────────────────── */
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function scrollDown() {
        const box = document.getElementById('chatbox');
        box.scrollTop = box.scrollHeight;
    }

    function addMessage(text, role) {
        const box = document.getElementById('chatbox');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;

        const av = document.createElement('div');
        av.className = 'msg-avatar';
        av.textContent = role === 'bot' ? 'AI' : 'You';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;

        row.appendChild(av);
        row.appendChild(bubble);
        box.appendChild(row);
        scrollDown();
        return row;
    }

    function addTyping() {
        const box = document.getElementById('chatbox');
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        row.id = 'typing-row';

        const av = document.createElement('div');
        av.className = 'msg-avatar';
        av.textContent = 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

        row.appendChild(av);
        row.appendChild(bubble);
        box.appendChild(row);
        scrollDown();
    }

    function removeTyping() {
        const el = document.getElementById('typing-row');
        if (el) el.remove();
    }

    function quickSend(btn) {
        document.getElementById('message').value = btn.textContent;
        document.getElementById('suggestions').style.display = 'none';
        sendMessage();
    }

    /* ─── Main send function ─────────────────────────────────────────────── */
    async function sendMessage() {
        const input = document.getElementById('message');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        btn.disabled = true;
        document.getElementById('suggestions').style.display = 'none';

        /* Show user message */
        addMessage(text, 'user');
        history.push({ role: 'user', content: text });

        /* Show typing indicator */
        addTyping();

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': API_KEY,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    system: SYSTEM_PROMPT,
                    messages: history
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || `HTTP ${response.status}`);
            }

            const data = await response.json();
            const reply = data.content?.map(b => b.text || '').join('') || "Sorry, I couldn't get a response.";

            history.push({ role: 'assistant', content: reply });
            removeTyping();
            addMessage(reply, 'bot');

        } catch (error) {
            console.error('API Error:', error);
            removeTyping();
            addMessage('⚠️ ' + (error.message || 'Something went wrong. Please try again.'), 'bot');
        }

        btn.disabled = false;
        input.focus();
    }

    /* Enter key to send */
    document.getElementById('message').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) sendMessage();
    });
</script>
</body>
</html>
